<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRUD Usuários</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-4">
      <div class="container">
        <span class="navbar-brand">AGENDA DE CONTATOS </span>
      </div>

    <div class="container">
      <div id="alerta" class="alert d-none" role="alert"></div>

      <div class="card mb-4">
        <div class="card-header bg-success text-white">Cadastro de Contato</div>
        <div class="card-body">
          <form id="form-usuario" onsubmit="salvarUsuario(this); return false;">
            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label">Nome</label>
                <input
                  type="text"
                  class="form-control"
                  name="nome"
                  placeholder="Nome completo"
                  required
                />
              </div>
<!--
              <div class="col-md-4">
                <label class="form-label">E-mail</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  placeholder="email@exemplo.com"
                  required
                />
              </div>
-->
              <div class="col-md-4">
                <label class="form-label">Telefone</label>
                <input
                  type="tel"
                  class="form-control"
                  name="telefone"
                  placeholder="(00) 00000-0000"
                />
              </div>
            </div>

            <div class="mt-3">
              <button type="submit" class="btn btn-success">Salvar</button>
              <button
                type="reset"
                class="btn btn-outline-secondary ms-2"
                onclick="delete this.form.dataset.editId"
              >
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-header">Lista de Usuários</div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbl-usuarios"></tbody>
          </table>
        </div>
      </div>
